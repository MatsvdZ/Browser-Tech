<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Formulier verstuurd!</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #0b3680, #000);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pop 0.6s ease;
    }

    p {
      font-size: 1.25rem;
      opacity: 0.9;
    }

    .container {
      z-index: 2;
    }

    /* 🎆 Vuurwerk */
    .firework {
      position: absolute;
      width: 4px;
      height: 4px;
      background: transparent;
      border-radius: 50%;
      box-shadow:
        0 -100px red,
        100px 0 blue,
        -100px 0 yellow,
        0 100px green,
        70px 70px orange,
        -70px -70px pink,
        70px -70px cyan,
        -70px 70px purple;
      animation: explode 1.2s ease-out infinite;
    }

    .firework:nth-child(2) {
      top: 30%;
      left: 20%;
      animation-delay: 0.5s;
    }

    .firework:nth-child(3) {
      top: 60%;
      left: 70%;
      animation-delay: 1s;
    }

    .firework:nth-child(4) {
      top: 40%;
      left: 50%;
      animation-delay: 0.2s;
    }

    @keyframes explode {
      0% {
        transform: scale(0.2);
        opacity: 1;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    /* 🎉 Confetti */
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background: yellow;
      top: -10px;
      animation: fall 3s linear infinite;
    }

    .confetti:nth-child(5) { left: 10%; background: red; }
    .confetti:nth-child(6) { left: 30%; background: blue; }
    .confetti:nth-child(7) { left: 50%; background: green; }
    .confetti:nth-child(8) { left: 70%; background: orange; }
    .confetti:nth-child(9) { left: 90%; background: pink; }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Button */
    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: #ffc70f;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    a:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- 🎆 Vuurwerk -->
  <div class="firework" style="top:20%; left:30%;"></div>
  <div class="firework"></div>
  <div class="firework"></div>
  <div class="firework"></div>

  <!-- 🎉 Confetti -->
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>
  <div class="confetti"></div>

  <!-- Content -->
  <div class="container">
    <h1>🎉 Formulier verstuurd! 🎉</h1>
    <p>Gefeliciteerd! Je hebt zojuist een administratief meesterwerk voltooid.</p>
    <p>De Belastingdienst is trots op je. (Waarschijnlijk.)</p>

    <a href="/">Terug naar start</a>
  </div>

</body>
</html>
